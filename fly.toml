app = 'app-cometogather'
primary_region = 'iad'

[build]

[deploy]
  release_command = '/app/migrate'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[env]
  PORT = '8080'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
