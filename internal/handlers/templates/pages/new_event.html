{{ template "base.html" . }}

{{ define "main" }}
<main class="max-w-lg mx-auto px-6 py-8">

  <a href="/" class="inline-flex items-center gap-1.5 text-sm text-stone-400 hover:text-stone-600 mb-6">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" /></svg>
    Gatherings
  </a>

  <h1 class="text-2xl font-bold text-stone-900 mb-6">New gathering</h1>

  <p id="form-error" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2 mb-5"></p>

  <form id="new-event-form" class="space-y-5">

    <div class="space-y-1.5">
      <label class="text-sm font-medium text-stone-700" for="name">Name</label>
      <input
        id="name" name="name" type="text"
        placeholder="Summer Reunion 2026"
        class="w-full px-3.5 py-2.5 rounded-lg border border-stone-300 text-sm text-stone-900 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent"
      />
    </div>

    <div class="space-y-1.5">
      <label class="text-sm font-medium text-stone-700">Dates</label>
      <div class="flex items-center gap-2">
        <input
          id="start_date" name="start_date" type="date"
          class="flex-1 px-3.5 py-2.5 rounded-lg border border-stone-300 text-sm text-stone-900 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent"
        />
        <span class="text-stone-400 text-sm shrink-0">to</span>
        <input
          id="end_date" name="end_date" type="date"
          class="flex-1 px-3.5 py-2.5 rounded-lg border border-stone-300 text-sm text-stone-900 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent"
        />
      </div>
    </div>

    <div class="space-y-1.5">
      <label class="text-sm font-medium text-stone-700" for="location">Location</label>
      <div class="relative">
        <input
          id="location" name="location" type="text"
          placeholder="Lake Tahoe, CA"
          autocomplete="off"
          class="w-full px-3.5 py-2.5 rounded-lg border border-stone-300 text-sm text-stone-900 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent"
        />
        <ul id="location-suggestions" class="hidden absolute z-10 w-full mt-1 bg-white border border-stone-200 rounded-lg shadow-lg overflow-hidden"></ul>
      </div>
    </div>

    <div class="space-y-1.5">
      <div class="flex items-baseline justify-between">
        <label class="text-sm font-medium text-stone-700" for="description">Description</label>
        <span class="text-xs text-stone-400">Optional</span>
      </div>
      <textarea
        id="description" name="description"
        rows="3"
        placeholder="Anything people should know before they arrive…"
        class="w-full px-3.5 py-2.5 rounded-lg border border-stone-300 text-sm text-stone-900 placeholder-stone-400 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent resize-none"
      ></textarea>
    </div>

    <hr class="border-stone-200" />

    <div class="flex items-center justify-between">
      <a href="/" class="text-sm text-stone-400 hover:text-stone-600">Cancel</a>
      <button
        type="submit"
        class="px-5 py-2.5 rounded-lg bg-amber-500 text-white text-sm font-semibold hover:bg-amber-600 transition-colors"
      >
        Create gathering
      </button>
    </div>

  </form>

</main>
<script nonce="{{ .CspNonce }}">
  var startDateInput = document.getElementById("start_date");
  var endDateInput   = document.getElementById("end_date");
  startDateInput.addEventListener("change", function () {
    endDateInput.min = startDateInput.value;
    if (endDateInput.value && endDateInput.value < startDateInput.value) {
      endDateInput.value = startDateInput.value;
    }
  });

  (function () {
    var token = "{{ .MapboxToken }}";
    if (!token) return;
    var input  = document.getElementById("location");
    var list   = document.getElementById("location-suggestions");
    var timer;
    input.addEventListener("input", function () {
      clearTimeout(timer);
      var q = input.value.trim();
      if (q.length < 2) { list.classList.add("hidden"); return; }
      timer = setTimeout(async function () {
        var url = "https://api.mapbox.com/geocoding/v5/mapbox.places/" + encodeURIComponent(q) +
          ".json?access_token=" + token + "&types=place,locality,region&limit=5";
        var resp = await fetch(url);
        if (!resp.ok) return;
        var data = await resp.json();
        list.innerHTML = "";
        if (!data.features.length) { list.classList.add("hidden"); return; }
        data.features.forEach(function (f) {
          var li = document.createElement("li");
          li.className = "px-3.5 py-2.5 text-sm text-stone-700 hover:bg-stone-50 cursor-pointer";
          li.textContent = f.place_name;
          li.addEventListener("mousedown", function (e) {
            e.preventDefault();
            input.value = f.place_name;
            list.classList.add("hidden");
          });
          list.appendChild(li);
        });
        list.classList.remove("hidden");
      }, 300);
    });
    input.addEventListener("blur", function () { setTimeout(function () { list.classList.add("hidden"); }, 150); });
  })();

  document.getElementById("new-event-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const errorEl = document.getElementById("form-error");
    errorEl.classList.add("hidden");

    const resp = await fetch("/events/new", {
      method: "POST",
      credentials: "include",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        name: document.getElementById("name").value,
        start_date: document.getElementById("start_date").value,
        end_date: document.getElementById("end_date").value,
        location: document.getElementById("location").value,
        description: document.getElementById("description").value,
      }),
    });

    if (!resp.ok) {
      errorEl.textContent = (await resp.text()).trim();
      errorEl.classList.remove("hidden");
      return;
    }

    const { id } = await resp.json();
    window.location.href = `/events/${id}`;
  });
</script>
{{ end }}
