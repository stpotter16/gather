{{ template "base.html" . }}

{{ define "main" }}
<main class="max-w-lg mx-auto px-6 py-8">

  <a href="/" class="inline-flex items-center gap-1.5 text-sm text-stone-400 hover:text-stone-600 mb-6">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" /></svg>
    Back
  </a>

  <h1 class="text-2xl font-bold text-stone-900 mb-6">Account</h1>

  <div class="bg-white rounded-xl border border-stone-200 overflow-hidden">
    <div class="px-5 py-4 border-b border-stone-100">
      <h2 class="text-sm font-semibold text-stone-700">Change password</h2>
    </div>
    <div class="px-5 py-5 space-y-4">

      <p id="form-error" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2"></p>
      <p id="form-success" class="hidden text-sm text-emerald-700 bg-emerald-50 border border-emerald-200 rounded-lg px-3 py-2">Password updated successfully.</p>

      <div class="space-y-1.5">
        <label class="text-sm font-medium text-stone-700" for="current_password">Current password</label>
        <div class="relative">
          <input id="current_password" type="password" autocomplete="current-password"
            class="w-full px-3.5 py-2.5 pr-10 rounded-lg border border-stone-300 text-sm text-stone-900 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent" />
          <button type="button" class="toggle-pw absolute inset-y-0 right-0 flex items-center px-3 text-stone-400 hover:text-stone-600 transition-colors" data-target="current_password">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.964-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
          </button>
        </div>
      </div>

      <div class="space-y-1.5">
        <label class="text-sm font-medium text-stone-700" for="new_password">New password</label>
        <div class="relative">
          <input id="new_password" type="password" autocomplete="new-password"
            class="w-full px-3.5 py-2.5 pr-10 rounded-lg border border-stone-300 text-sm text-stone-900 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent" />
          <button type="button" class="toggle-pw absolute inset-y-0 right-0 flex items-center px-3 text-stone-400 hover:text-stone-600 transition-colors" data-target="new_password">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.964-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
          </button>
        </div>
      </div>

      <div class="space-y-1.5">
        <label class="text-sm font-medium text-stone-700" for="confirm_password">Confirm new password</label>
        <div class="relative">
          <input id="confirm_password" type="password" autocomplete="new-password"
            class="w-full px-3.5 py-2.5 pr-10 rounded-lg border border-stone-300 text-sm text-stone-900 focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent" />
          <button type="button" class="toggle-pw absolute inset-y-0 right-0 flex items-center px-3 text-stone-400 hover:text-stone-600 transition-colors" data-target="confirm_password">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.964-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
          </button>
        </div>
      </div>

      <div class="flex justify-end pt-1">
        <button id="save-password"
          class="px-5 py-2.5 rounded-lg bg-amber-500 text-white text-sm font-semibold hover:bg-amber-600 transition-colors">
          Update password
        </button>
      </div>

    </div>
  </div>

</main>
<script nonce="{{ .CspNonce }}">
  var eyeOpen   = '<path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.964-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />';
  var eyeClosed = '<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />';
  document.querySelectorAll(".toggle-pw").forEach(function (btn) {
    btn.addEventListener("click", function () {
      var input = document.getElementById(btn.dataset.target);
      var show  = input.type === "password";
      input.type = show ? "text" : "password";
      btn.querySelector("svg").innerHTML = show ? eyeClosed : eyeOpen;
    });
  });

  document.getElementById("save-password").addEventListener("click", async function () {
    var errorEl   = document.getElementById("form-error");
    var successEl = document.getElementById("form-success");
    errorEl.classList.add("hidden");
    successEl.classList.add("hidden");

    var resp = await fetch("/account/password", {
      method: "POST",
      credentials: "include",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        current_password: document.getElementById("current_password").value,
        new_password:     document.getElementById("new_password").value,
        confirm_password: document.getElementById("confirm_password").value,
      }),
    });

    if (!resp.ok) {
      errorEl.textContent = (await resp.text()).trim();
      errorEl.classList.remove("hidden");
      return;
    }

    document.getElementById("current_password").value = "";
    document.getElementById("new_password").value = "";
    document.getElementById("confirm_password").value = "";
    successEl.classList.remove("hidden");
  });
</script>
{{ end }}
